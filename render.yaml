services:
  - type: web
    name: creditassist-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20

  - type: web
    name: creditassist-ui
    env: static
    rootDir: frontend
    buildCommand: npm install; npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /api/*
        destination: https://creditassist-api.onrender.com/api/:splat
